# nginx for the single-container deployment: cookie-sticky reverse proxy in
# front of N single-worker uvicorns (managed by supervisord). Runs as non-root
# (appuser): no `user` directive, pid + temp paths in /tmp, listens on 8000.
#
# Routing: hash the user_id cookie so a given browser always hits the same
# uvicorn (its own leaderboard count is then instant). Cookie-less first visits
# are routed on $request_id (round-robin) until the app sets the cookie.
# WebSocket/ASGI-aware: Upgrade/Connection headers are forwarded.
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events { worker_connections 1024; }

http {
    access_log /dev/stdout;

    # temp paths under /tmp so the non-root worker can write them
    client_body_temp_path /tmp/ng_client;
    proxy_temp_path        /tmp/ng_proxy;
    fastcgi_temp_path      /tmp/ng_fastcgi;
    uwsgi_temp_path        /tmp/ng_uwsgi;
    scgi_temp_path         /tmp/ng_scgi;

    # upload cap ≥ the app's MAX_UPLOAD_BYTES (5 MB)
    client_max_body_size 8m;

    # WebSocket-aware Connection header (upgrade when upgrading, else close)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # sticky by user_id cookie; empty cookie (first visit) → round-robin
    map $cookie_user_id $sticky_key {
        default $cookie_user_id;
        ~^$     $request_id;
    }

    upstream app_backend {
        hash $sticky_key consistent;
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
    }

    server {
        listen 8000;
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
