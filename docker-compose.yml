services:
  app:
    build:
      context: .
      # Build for the host's native arch: linux/arm64 on Apple Silicon (fast,
      # native), linux/amd64 on an x86_64 server. Don't pin `platform`.
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /models
      # Models are baked into /models at image build time (Dockerfile runs
      # scripts/prewarm_models.py), so they are always present at runtime.
      # Offline mode skips HuggingFace's per-file etag/HEAD validation that
      # otherwise adds ~5-6s to every cold model load.
      HF_HUB_OFFLINE: "1"
      # Each worker loads its own ~2 GB of models (Wav2Vec2 + Kokoro); 2 workers
      # → ~4 GB, well within the 8 GB limit below with headroom for overhead.
      WORKERS: "2"
    volumes:
      # Named volume → persists user recordings, history, and any new references.
      # On first create Docker seeds it from the image's /app/data (the bundled
      # default references), so the demo is populated immediately.
      - app-data:/app/data
      # Leaderboard db.json — host-persistent (survives rebuilds, inspectable).
      # Nested bind mount takes precedence for this subpath.
      - ./data/storage:/app/data/storage
    restart: unless-stopped
    mem_limit: 8g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

volumes:
  app-data:
