services:
  app:
    build:
      context: .
      # Build for the host's native arch: linux/arm64 on Apple Silicon (fast,
      # native), linux/amd64 on an x86_64 server. Don't pin `platform`.
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /models
      # Models are baked into /models at image build time (Dockerfile runs
      # scripts/prewarm_models.py), so they are always present at runtime.
      # Offline mode skips HuggingFace's per-file etag/HEAD validation that
      # otherwise adds ~5-6s to every cold model load.
      HF_HUB_OFFLINE: "1"
      # The container runs supervisord → nginx → 2 single-worker uvicorns
      # (cookie-sticky, see docker/supervisord.conf + docker/nginx.conf). Each
      # uvicorn loads its own ~2 GB of models; 2 → ~4 GB, within the 8 GB limit.
      # Worker count is the number of [program:uvicorn-N] entries, not an env.
    volumes:
      # Named volume → persists user recordings, history, references, AND the
      # leaderboard (data/storage/{db.json,hashes}). On first create Docker seeds
      # it from the image's /app/data (the bundled default references); it then
      # survives rebuilds and `down`/`up` (only `down -v` wipes it). No separate
      # bind mount: a nested bind mount would be root-owned on the host and the
      # non-root container couldn't write to it.
      - app-data:/app/data
    restart: unless-stopped
    mem_limit: 8g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()"
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s

volumes:
  app-data:
